name: Refresh Instagram Feed

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Refresh Instagram feed
        env:
          INSTAGRAM_TOKEN:    ${{ secrets.INSTAGRAM_TOKEN }}
          BUNNY_API_KEY:      ${{ secrets.BUNNY_API_KEY }}
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
          BUNNY_CDN_URL:      ${{ secrets.BUNNY_CDN_URL }}
          BUNNY_DOMAIN:       ${{ secrets.BUNNY_DOMAIN }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
        run: node refresh.js

      - name: Commit updated feed.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/feed.json
          git diff --cached --quiet || git commit -m "chore: refresh Instagram feed $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
